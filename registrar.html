<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Solicitud - HNASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
            <p>Registrar nueva solicitud de Rx Portátil</p>
        </header>

        <section class="card">
            <h2>📝 Nueva Solicitud</h2>
            <form id="formSolicitud">
                <div class="form-group">
                    <label>DNI del paciente: *</label>
                    <input type="text" id="dniPaciente" placeholder="Ej: 12345678" maxlength="8" required>
                </div>
                <div class="form-group">
                    <label>Nombre y apellido del paciente:</label>
                    <input type="text" id="nombrePaciente" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Servicio que solicita: *</label>
                    <input type="text" id="servicio" placeholder="Ej: Medicina, Cirugía, UCI, Emergencia" required>
                </div>
                <div class="form-group">
                    <label>Personal de salud que solicita:</label>
                    <input type="text" id="solicitadoPor" placeholder="Nombre del personal de salud">
                </div>
                <div class="form-group">
                    <label>Notas / Observaciones:</label>
                    <textarea id="notas" rows="3" placeholder="Indicaciones especiales, posición, etc."></textarea>
                </div>
                
                <div class="form-group">
                    <label>¿Es un estudio programado?</label>
                    <select id="esProgramado" onchange="toggleHoraProgramada()">
                        <option value="no">No - Solicitud inmediata</option>
                        <option value="si">Sí - Estudio programado</option>
                    </select>
                </div>

                <div class="form-group" id="grupoHoraProgramada" style="display: none;">
                    <label>Hora programada del estudio:</label>
                    <input type="datetime-local" id="horaProgramada">
                    <small>📅 Selecciona fecha y hora exacta del estudio programado</small>
                </div>
                
                <div class="form-group">
                    <label>Adjuntar solicitud: * (Foto o PDF)</label>
                    <div class="file-options">
                        <label class="file-label">
                            <input type="file" id="fotoSolicitud" accept="image/*" capture="environment" onchange="seleccionarArchivo(this, 'foto')">
                            <span class="file-btn">📷 Foto</span>
                        </label>
                        <label class="file-label">
                            <input type="file" id="pdfSolicitud" accept=".pdf,application/pdf" onchange="seleccionarArchivo(this, 'pdf')">
                            <span class="file-btn">📄 PDF</span>
                        </label>
                    </div>
                    <div id="archivoSeleccionado" class="archivo-info"></div>
                    <small>📎 Subir foto de la solicitud o archivo PDF</small>
                </div>
                
                <button type="submit" class="btn-primary">➕ Registrar Solicitud</button>
            </form>
        </section>

        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleHoraProgramada() {
            const esProgramado = document.getElementById('esProgramado').value;
            const grupoHora = document.getElementById('grupoHoraProgramada');
            grupoHora.style.display = esProgramado === 'si' ? 'block' : 'none';
        }
        
        let tipoArchivo = null;
        let archivoData = null;
        
        window.seleccionarArchivo = function(input, tipo) {
            if (input.files && input.files[0]) {
                tipoArchivo = tipo;
                archivoData = input.files[0];
                
                const info = document.getElementById('archivoSeleccionado');
                const nombre = input.files[0].name;
                const tamaño = (input.files[0].size / 1024).toFixed(1);
                
                info.innerHTML = '<div class="archivo-seleccionado"><span>✅ ' + tipo.toUpperCase() + ' seleccionado:</span><strong>' + nombre + '</strong><span>(' + tamaño + ' KB)</span></div>';
                
                // Limpiar el otro input
                if (tipo === 'foto') {
                    document.getElementById('pdfSolicitud').value = '';
                } else {
                    document.getElementById('fotoSolicitud').value = '';
                }
            }
        };
    </script>
</body>
</html>
