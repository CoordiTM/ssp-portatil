<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Solicitud - HNASS SSP Rx Portátil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 HNASS - Servicios de Radiodiagnóstico y Ecografía</h1>
            <p>Registrar nueva solicitud de Rx Portátil</p>
        </header>

        <section class="card">
            <h2>📝 Nueva Solicitud</h2>
            <form id="formSolicitud">
                <div class="form-group">
                    <label>DNI del paciente:</label>
                    <input type="text" id="dniPaciente" placeholder="Ej: 12345678" maxlength="8" required>
                </div>
                <div class="form-group">
                    <label>Nombre y apellido del paciente:</label>
                    <input type="text" id="nombrePaciente" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label>Habitación / Ubicación:</label>
                    <input type="text" id="habitacion" placeholder="Ej: 205-A / UCI / Emergencia" required>
                </div>
                <div class="form-group">
                    <label>Tipo de Estudio:</label>
                    <select id="tipoEstudio" required>
                        <option value="">Seleccionar...</option>
                        <option value="Torax AP">Tórax AP</option>
                        <option value="Torax Lateral">Tórax Lateral</option>
                        <option value="Abdomen">Abdomen</option>
                        <option value="Extremidad">Extremidad</option>
                        <option value="Cranneo">Cráneo</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Urgencia:</label>
                    <select id="urgencia" required>
                        <option value="normal">Normal</option>
                        <option value="urgente">Urgente</option>
                        <option value="emergencia">Emergencia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Personal de salud que solicita:</label>
                    <input type="text" id="solicitadoPor" placeholder="Nombre del personal de salud" required>
                </div>
                <div class="form-group">
                    <label>Notas / Observaciones:</label>
                    <textarea id="notas" rows="3" placeholder="Indicaciones especiales, posición, etc."></textarea>
                </div>
                <div class="form-group">
                    <label>Foto de la solicitud:</label>
                    <input type="file" id="fotoSolicitud" accept="image/*" capture="environment" required>
                    <small>📷 Toma foto del papel de solicitud</small>
                </div>
                <button type="submit" class="btn-primary">➕ Registrar Solicitud</button>
            </form>
        </section>

        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
