<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HNASS SSP Rx Portátil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 HNASS - Servicios de Radiodiagnóstico y Ecografía</h1>
            <p id="userInfo">Tecnólogo: <span id="nombreTecnologo">-</span></p>
        </header>

        <!-- Filtros de estado -->
        <section class="card filtros">
            <h2>📊 Solicitudes por Estado</h2>
            <div class="filtro-botones">
                <button onclick="filtrarEstado('pendiente')" class="btn-filtro btn-pendiente" id="btn-pendiente">
                    ⏳ Pendientes <span class="badge" id="countPendiente">0</span>
                </button>
                <button onclick="filtrarEstado('en_camino')" class="btn-filtro btn-camino" id="btn-camino">
                    🚶 En camino <span class="badge" id="countEnCamino">0</span>
                </button>
                <button onclick="filtrarEstado('atendiendo')" class="btn-filtro btn-atendiendo" id="btn-atendiendo">
                    🔬 Atendiendo <span class="badge" id="countAtendiendo">0</span>
                </button>
                <button onclick="filtrarEstado('finalizado')" class="btn-filtro btn-finalizado" id="btn-finalizado">
                    ✅ Atendidos <span class="badge" id="countFinalizado">0</span>
                </button>
                <button onclick="filtrarEstado('todos')" class="btn-filtro btn-todos active" id="btn-todos">
                    📋 Todos
                </button>
            </div>
        </section>

        <!-- Lista de solicitudes -->
        <section class="card">
            <h2 id="tituloLista">📋 Todas las Solicitudes</h2>
            <div id="listaSolicitudes" class="lista">
                <p class="empty">Cargando...</p>
            </div>
        </section>

        <a href="index.html" class="btn-volver">← Cerrar sesión</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
