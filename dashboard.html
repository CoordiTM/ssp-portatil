<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HNASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
            <p id="userInfo">Tecnólogo: <span id="nombreTecnologo">-</span></p>
            <div class="turno-controls" style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button id="btnIniciarTurno" onclick="iniciarTurno()" class="btn-turno btn-iniciar" style="background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;">🟢 INICIAR TURNO</button>
                <button id="btnFinTurno" onclick="finTurno()" class="btn-turno btn-fin" style="background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: none;">🔴 FIN DE TURNO</button>
                <span id="estadoTurno" style="color: white; font-size: 0.9rem; align-self: center;"></span>
            </div>
        </header>

        <section class="card filtros">
            <h2>📊 Solicitudes</h2>

            <div class="filtro-fecha">
                <label>Fecha:</label>
                <input type="date" id="fechaFiltro">
            </div>

            <div class="filtro-botones">
                <button onclick="filtrarEstado('pendiente')" class="btn-filtro btn-pendiente" id="btn-pendiente">
                    ⏳ <span class="badge" id="countPendiente">0</span>
                </button>
                <button onclick="filtrarEstado('en_camino')" class="btn-filtro btn-camino" id="btn-camino">
                    🚶 <span class="badge" id="countEnCamino">0</span>
                </button>
                <button onclick="filtrarEstado('rechazado')" class="btn-filtro btn-rechazado" id="btn-rechazado">
                    ❌ <span class="badge" id="countRechazado">0</span>
                </button>
                <button onclick="filtrarEstado('finalizado')" class="btn-filtro btn-finalizado" id="btn-finalizado">
                    ✅ <span class="badge" id="countFinalizado">0</span>
                </button>
                <button onclick="filtrarEstado('todos')" class="btn-filtro btn-todos active" id="btn-todos">
                    📋
                </button>
            </div>
        </section>

        <section class="card">
            <h2 id="tituloLista">📋 Todas</h2>
            <div id="listaSolicitudes" class="lista-cards">
                <p class="empty">Cargando...</p>
            </div>
        </section>

        <a href="index.html" class="btn-volver" onclick="localStorage.clear()">← Cerrar sesión</a>

        <footer style="text-align: center; margin-top: 20px; padding: 15px; color: #999; font-size: 0.75rem;">
            <p>© 2026 HNASS - Todos los derechos reservados</p>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
