<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HNASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
            <p id="userInfo">Tecnólogo: <span id="nombreTecnologo">-</span></p>
        </header>

        <section class="card filtros">
            <h2>📊 Solicitudes por Estado</h2>
            <div class="filtro-botones">
                <button onclick="filtrarEstado('pendiente')" class="btn-filtro btn-pendiente" id="btn-pendiente">
                    ⏳ Pendientes <span class="badge" id="countPendiente">0</span>
                </button>
                <button onclick="filtrarEstado('en_camino')" class="btn-filtro btn-camino" id="btn-camino">
                    🚶 En camino <span class="badge" id="countEnCamino">0</span>
                </button>
                <button onclick="filtrarEstado('rechazado')" class="btn-filtro btn-rechazado" id="btn-rechazado">
                    ❌ No atendido <span class="badge" id="countRechazado">0</span>
                </button>
                <button onclick="filtrarEstado('finalizado')" class="btn-filtro btn-finalizado" id="btn-finalizado">
                    ✅ Atendidos <span class="badge" id="countFinalizado">0</span>
                </button>
                <button onclick="filtrarEstado('todos')" class="btn-filtro btn-todos active" id="btn-todos">
                    📋 Todos
                </button>
            </div>
        </section>

        <section class="card">
            <h2 id="tituloLista">📋 Todas las Solicitudes</h2>
            <div class="tabla-container">
                <table class="tabla-solicitudes" id="tablaSolicitudes">
                    <thead>
                        <tr>
                            <th>🕐 Fecha/Hora</th>
                            <th>⏱️ Tiempo</th>
                            <th>🆔 DNI</th>
                            <th>👤 Paciente</th>
                            <th>🙋 Solicita</th>
                            <th>📝 Notas</th>
                            <th>📷 Foto</th>
                            <th>🔬 Tecnólogo</th>
                            <th>⚡ Estado</th>
                            <th>🎮 Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodySolicitudes">
                        <tr><td colspan="10" class="empty">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <a href="index.html" class="btn-volver" onclick="localStorage.clear()">← Cerrar sesión</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
