<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HNASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container login-page">
        <header class="header-main">
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
        </header>

        <div class="card login-card">
            <h2 id="tituloLogin">☢️ Ingreso Tecnólogo Médico</h2>
            
            <form id="formLogin">
                <div class="form-group" id="grupoDNI">
                    <label>DNI:</label>
                    <input type="text" id="dni" placeholder="Ingrese su DNI" maxlength="8">
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="clave" placeholder="Ingrese su clave" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            
            <a href="index.html" class="btn-volver">← Volver al inicio</a>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
