<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Solicitud - HNASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header-main">
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
            <p>Consultar estado de solicitud</p>
        </header>

        <section class="card">
            <h2>🔍 Consultar Estado</h2>
            <form id="formConsulta">
                <div class="form-group">
                    <label>DNI del paciente:</label>
                    <input type="text" id="codigoSeguimiento" placeholder="Ingrese el DNI del paciente" required>
                    <small>Ingrese el DNI que usó al registrar la solicitud</small>
                </div>
                <button type="submit" class="btn-primary">🔍 Consultar</button>
            </form>
        </section>

        <div id="resultadoConsulta" class="consulta-resultado"></div>

        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
