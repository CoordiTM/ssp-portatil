<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - HNASS</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- jsPDF + autoTable para exportar PDFs -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .modal-wide {
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 200px;
        }
        .modal-content h4 {
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-main" >
            <div class="menu-hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="#" onclick="localStorage.clear(); window.location.href='index.html'; return false;">🚪 Cerrar sesión</a>
            </div>
            <h1>🏥 Servicio de Radiodiagnóstico y Ecografía HNASS</h1>
            <h2>Panel de Administración</h2>
        </header>

        <!-- GESTIÓN DE SOLICITUDES -->
        <section class="card">
            <h2>📋 Gestión de Solicitudes</h2>

            <div class="filtro-fecha">
                <label>Filtrar por estado:</label>
                <select id="filtroEstadoAdmin" onchange="cargarSolicitudesAdmin()">
                    <option value="pendiente" selected>Pendientes</option>
                    <option value="todos">Todas</option>
                    <option value="en_camino">En camino</option>
                    <option value="rechazado">No atendidas</option>
                    <option value="finalizado">Atendidas</option>
                </select>
            </div>

            <div id="listaSolicitudesAdmin" class="lista-cards">
                <p class="empty">Cargando solicitudes...</p>
            </div>
        </section>

        <!-- Crear Tecnólogo -->
        <section class="card">
            <h2>👤 Crear Nuevo Tecnólogo</h2>
            <form id="formCrearTecnologo">
                <div class="form-group">
                    <label>DNI:</label>
                    <input type="text" id="tecDNI" placeholder="DNI del tecnólogo" maxlength="8" required>
                </div>
                <div class="form-group">
                    <label>Nombre completo:</label>
                    <input type="text" id="tecNombre" placeholder="Nombre y apellido" required>
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="tecClave" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-primary">➕ Crear Tecnólogo</button>
            </form>
        </section>

        <!-- Lista de tecnólogos -->
        <section class="card">
            <h2 class="acordeon-header" onclick="toggleAcordeon('tecAcordeon')">
                👥 Tecnólogos Médicos Registrados
                <span class="acordeon-icon" id="tecIcon">▼</span>
            </h2>
            <div id="tecAcordeon" class="acordeon-body">
                <div id="listaTecnologos" class="lista">
                    <p class="empty">Cargando...</p>
                </div>
            </div>
        </section>

        <!-- Reportes -->
        <section class="card">
            <h2>📈 Reportes</h2>

            <div class="form-group">
                <label>Tipo de reporte:</label>
                <select id="tipoReporte" onchange="toggleTecnologoFiltro()">
                    <option value="general">General (todos los tecnólogos)</option>
                    <option value="individual">Individual (por tecnólogo)</option>
                </select>
            </div>

            <div class="form-group" id="grupoTecnologo" style="display:none;">
                <label>Tecnólogo Médico:</label>
                <select id="tecnologoFiltro">
                    <option value="">Seleccionar...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Desde:</label>
                <input type="date" id="fechaDesde">
            </div>
            <div class="form-group">
                <label>Hasta:</label>
                <input type="date" id="fechaHasta">
            </div>

            <button onclick="generarReporte()" class="btn-primary">📊 Generar Reporte</button>

            <div id="resultadoReporte" class="reporte-resultado" style="margin-top:20px;"></div>
        </section>

    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleTecnologoFiltro() {
            const tipo = document.getElementById('tipoReporte').value;
            document.getElementById('grupoTecnologo').style.display = tipo === 'individual' ? 'block' : 'none';
        }
    </script>
    <!-- Modal Editar Tecnólogo -->
    <div class="modal-overlay" id="modalEditarTecnologo">
        <div class="modal-content">
            <h3>✏️ Editar Tecnólogo</h3>
            <input type="hidden" id="editTecId">
            <div class="form-group">
                <label>DNI:</label>
                <input type="text" id="editTecDNI" maxlength="8">
            </div>
            <div class="form-group">
                <label>Nombre completo:</label>
                <input type="text" id="editTecNombre">
            </div>
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" id="editTecClave" placeholder="Dejar en blanco para mantener actual">
            </div>
            <div class="modal-buttons">
                <button class="btn-guardar" onclick="guardarEdicionTecnologo()">💾 Guardar</button>
                <button class="btn-cancelar" onclick="cerrarModalEditar()">❌ Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.menu-hamburger') && !e.target.closest('.dropdown-menu')) {
                document.getElementById('dropdownMenu').classList.remove('active');
            }
        });
        function cerrarModalEditar() {
            document.getElementById('modalEditarTecnologo').classList.remove('active');
        }
    </script>
    <button class="btn-volver-arriba" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Volver arriba">↑</button>

    <!-- Modal Editar Solicitud -->
    <div class="modal-overlay" id="modalEditarSolicitud">
        <div class="modal-content modal-wide">
            <h3>✏️ Editar Solicitud</h3>
            <input type="hidden" id="editSolId">

            <div class="form-row">
                <div class="form-group">
                    <label>DNI Paciente:</label>
                    <input type="text" id="editSolDNI" maxlength="8">
                </div>
                <div class="form-group">
                    <label>Nombre Paciente:</label>
                    <input type="text" id="editSolNombre">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Servicio:</label>
                    <input type="text" id="editSolServicio">
                </div>
                <div class="form-group">
                    <label>N° Cama / Ubicación:</label>
                    <input type="text" id="editSolCama">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Solicitado por:</label>
                    <input type="text" id="editSolSolicita">
                </div>
                <div class="form-group">
                    <label>Tecnólogo Médico Asignado:</label>
                    <input type="text" id="editSolTecnologo">
                </div>
            </div>

            <div class="form-group">
                <label>Estado:</label>
                <select id="editSolEstado">
                    <option value="pendiente">⏳ Pendiente</option>
                    <option value="en_camino">🚶 En camino</option>
                    <option value="finalizado">✅ Atendido</option>
                    <option value="rechazado">❌ No atendido</option>
                </select>
            </div>

            <div class="form-group">
                <label>Notas / Observaciones:</label>
                <textarea id="editSolNotas" rows="2"></textarea>
            </div>

            <h4 style="margin-top: 15px; color: #1a5276;">🕐 Timestamps (Fechas/Hora)</h4>
            <div class="form-row">
                <div class="form-group">
                    <label>Creado:</label>
                    <input type="datetime-local" id="editSolCreado">
                </div>
                <div class="form-group">
                    <label>En camino:</label>
                    <input type="datetime-local" id="editSolEnCamino">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Finalizado:</label>
                    <input type="datetime-local" id="editSolFinalizado">
                </div>
                <div class="form-group">
                    <label>Rechazado:</label>
                    <input type="datetime-local" id="editSolRechazado">
                </div>
            </div>

            <div class="modal-buttons">
                <button class="btn-guardar" onclick="guardarEdicionSolicitud()">💾 Guardar Cambios</button>
                <button class="btn-cancelar" onclick="cerrarModalEditarSolicitud()">❌ Cancelar</button>
            </div>
        </div>
    </div>

</body>
</html>
